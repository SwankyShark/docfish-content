name: Promote Content to Stable

# Triggered by the in-app Approve button (developer mode only).
# Copies the specified update branch's content to stable/ on docfish-content
# main, rewrites the manifest's contentUrl to the stable/ path, cleans up
# any previous stable content file, and marks the update as promoted in
# pending.json.
#
# Required secret: CONTENT_REPO_PAT — a GitHub PAT with write access to
# SwankyShark/docfish-content (contents scope).

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Update branch to promote (e.g. update/2026-03-25-67045e2f)'
        required: true
        type: string

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout docfish-content
        uses: actions/checkout@v4
        with:
          repository: SwankyShark/docfish-content
          token: ${{ secrets.CONTENT_REPO_PAT }}
          ref: main
          fetch-depth: 0

      - name: Validate branch name format
        env:
          BRANCH: ${{ github.event.inputs.branch }}
        run: |
          if [[ ! "$BRANCH" =~ ^update/[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9a-f]{8}$ ]]; then
            echo "ERROR: Unexpected branch format: $BRANCH"
            echo "Expected: update/YYYY-MM-DD-xxxxxxxx"
            exit 1
          fi

      - name: Promote update branch to stable
        env:
          BRANCH: ${{ github.event.inputs.branch }}
          CONTENT_BASE_URL: https://swankyshark.github.io/docfish-content
        run: |
          set -euo pipefail

          git fetch origin "$BRANCH"

          # Locate manifest and content file on the update branch
          branch_subdir="update/${BRANCH#update/}"
          manifest_path="${branch_subdir}/manifest.json"
          content_path=$(git ls-tree -r --name-only "origin/${BRANCH}" \
            | grep "^${branch_subdir}/content-" | head -1)

          if [[ -z "$content_path" ]]; then
            echo "ERROR: No content file found on branch $BRANCH"
            exit 1
          fi

          content_filename=$(basename "$content_path")

          # Copy files from the update branch to stable/
          mkdir -p stable
          git show "origin/${BRANCH}:${manifest_path}" > stable/manifest.json
          git show "origin/${BRANCH}:${content_path}"  > "stable/${content_filename}"

          # Rewrite contentUrl → stable/ path; stamp promotedAt in manifest + pending.json
          python3 - "$CONTENT_BASE_URL" "$content_filename" <<'PYEOF'
          import json, sys
          from datetime import datetime, timezone

          base_url, content_filename = sys.argv[1], sys.argv[2]
          promoted_at = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')

          with open('stable/manifest.json') as f:
              manifest = json.load(f)
          manifest['contentUrl'] = f'{base_url}/stable/{content_filename}'
          manifest['promotedAt'] = promoted_at
          with open('stable/manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)

          with open('pending.json') as f:
              pending = json.load(f)
          pending['promotedAt'] = promoted_at
          with open('pending.json', 'w') as f:
              json.dump(pending, f, indent=2)

          print(f"Promoted: {manifest['sourceCommit'][:8]} → stable/{content_filename}")
          PYEOF

          # Remove old stable content file(s), keep only the new one
          for old in stable/content-*.json; do
            [[ "$(basename "$old")" == "$content_filename" ]] && continue
            echo "Removing old: $old"
            git rm -f "$old"
          done

      - name: Commit and push
        env:
          BRANCH: ${{ github.event.inputs.branch }}
        run: |
          git config user.name "Docfish Pipeline"
          git config user.email "docfish@swankyshark.com"
          git add stable/ pending.json
          git commit -m "Promote ${BRANCH} to stable"
          git push origin main
